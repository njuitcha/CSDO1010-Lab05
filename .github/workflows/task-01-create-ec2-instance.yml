name: Deploy Infrastructure
on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "deploy" to confirm infrastructure creation'
        required: true
        default: 'none'

env:
  TF_WORKING_DIR: terraform
  TF_BACKEND_BUCKET: ${{ secrets.STATE_BUCKET }}
  TF_BACKEND_KEY: lab05/terraform.tfstate
  TF_BACKEND_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform:
    if: github.event.inputs.confirmation == 'deploy'
    environment: LAB05
    name: Provision AWS EC2
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init (S3 backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_BACKEND_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform plan/apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform apply -input=false -auto-approve tfplan
